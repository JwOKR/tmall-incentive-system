<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4D4F"/>
      <stop offset="100%" style="stop-color:#FF7A45"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  
  <!-- 猫头轮廓 -->
  <path d="M18 22 L14 12 L22 18 L32 14 L42 18 L50 12 L46 22" 
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 猫脸 -->
  <ellipse cx="32" cy="30" rx="14" ry="12" fill="white"/>
  
  <!-- 眼睛 -->
  <ellipse cx="26" cy="28" rx="2.5" ry="3" fill="#333"/>
  <ellipse cx="38" cy="28" rx="2.5" ry="3" fill="#333"/>
  
  <!-- 眼睛高光 -->
  <circle cx="27" cy="27" r="1" fill="white"/>
  <circle cx="39" cy="27" r="1" fill="white"/>
  
  <!-- 鼻子 -->
  <path d="M30 32 L32 34 L34 32" fill="#FF6B6B" stroke="#FF6B6B" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 嘴巴 -->
  <path d="M28 35 Q32 38 36 35" fill="none" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <line x1="14" y1="30" x2="22" y2="32" stroke="#999" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="34" x2="22" y2="34" stroke="#999" stroke-width="1" stroke-linecap="round"/>
  <line x1="42" y1="32" x2="50" y2="30" stroke="#999" stroke-width="1" stroke-linecap="round"/>
  <line x1="42" y1="34" x2="50" y2="34" stroke="#999" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 金币 -->
  <circle cx="46" cy="46" r="10" fill="url(#coin)" stroke="#DAA520" stroke-width="1.5"/>
  <text x="46" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B6914" text-anchor="middle">¥</text>
  
  <!-- 金币高光 -->
  <path d="M40 42 Q46 38 52 42" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 上升箭头 -->
  <path d="M16 50 L22 44 L28 48 L34 40" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="34,36 38,40 34,40" fill="white"/>
</svg>