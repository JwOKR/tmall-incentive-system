<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- 深色背景 -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0F0F23"/>

  <!-- 外圆环装饰 -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#E8002D" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="23" fill="#E8002D"/>

  <!-- 内圆深色区 -->
  <circle cx="32" cy="32" r="17" fill="#0F0F23"/>

  <!-- 猫耳（在红色圆环内，从圆心区域伸出） -->
  <polygon points="24,15 18,7 30,15" fill="#E8002D"/>
  <polygon points="40,15 34,15 46,7" fill="#E8002D"/>

  <!-- 内耳粉色 -->
  <polygon points="24,15 20,9 28,15" fill="#FF6688"/>
  <polygon points="40,15 36,15 44,9" fill="#FF6688"/>

  <!-- 猫脸白色 -->
  <ellipse cx="32" cy="32" rx="13" ry="12" fill="white"/>

  <!-- 眼睛 -->
  <ellipse cx="26.5" cy="29.5" rx="3" ry="3.8" fill="#1a1a1a"/>
  <ellipse cx="37.5" cy="29.5" rx="3" ry="3.8" fill="#1a1a1a"/>
  <!-- 眼睛高光 -->
  <circle cx="27.5" cy="28" r="1.2" fill="white"/>
  <circle cx="38.5" cy="28" r="1.2" fill="white"/>

  <!-- 鼻子 -->
  <ellipse cx="32" cy="35" rx="2" ry="1.4" fill="#FF6B8A"/>

  <!-- 嘴 -->
  <path d="M28.5,37.5 Q32,40.5 35.5,37.5" fill="none" stroke="#CC4466" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 圆环上装饰点 -->
  <circle cx="4.5" cy="32" r="2" fill="white"/>
  <circle cx="59.5" cy="32" r="2" fill="white"/>
  <circle cx="32" cy="59.5" r="2" fill="white"/>
  <circle cx="32" cy="4.5" r="2" fill="white"/>

  <!-- 底部红色徽章 -->
  <rect x="10" y="50" width="44" height="12" rx="6" fill="#E8002D"/>
  <text x="32" y="59.5" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="7.5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">激励</text>
</svg>
