version: '3.8'

services:
  # Database
  db:
    image: mariadb:10
    container_name: tmall-incentive-db
    environment:
      MYSQL_DATABASE: tmall_incentive
      MYSQL_ROOT_PASSWORD: tmall2026
      MYSQL_USER: tmall
      MYSQL_PASSWORD: tmall2026
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tmall-incentive-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=mysql://tmall:tmall2026@db:3306/tmall_incentive
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    container_name: tmall-incentive-web
    ports:
      - "5678:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
