version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tmall-incentive-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=mysql://tmall:yw551129@host.docker.internal:3306/tmall_incentive
      - JWT_SECRET=tmall-jwt-secret-2026-yw551129
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://192.168.1.78:3001
    container_name: tmall-incentive-web
    ports:
      - "5678:80"
    volumes:
      - ./client/public/favicon.ico:/usr/share/nginx/html/favicon.ico:ro
      - ./client/public/favicon.png:/usr/share/nginx/html/favicon.png:ro
    depends_on:
      - api
    restart: unless-stopped
